<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - Yerel Esnaf Sipariş Sistemi</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<header>
    <div class="container">
        <h1>Esnaf</h1>
        <nav>
            <a th:href="@{/}">Ana Sayfa</a>
            
            <!-- Giriş yapmamış kullanıcılar için -->
            <span sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}">Giriş</a>
                <a th:href="@{/register}">Kayıt Ol</a>
            </span>
            
            <!-- MÜŞTERİ menüsü -->
            <span sec:authorize="hasRole('CUSTOMER')">
                <a th:href="@{/cart}">Sepet</a>
                <a th:href="@{/orders}">Siparişlerim</a>
                <a th:href="@{/profile}"> Profil</a>
                <a th:href="@{/logout}">Çıkış</a>
            </span>
            
            <!-- ESNAF menüsü -->
            <span sec:authorize="hasRole('SHOP_OWNER')">
                <a th:href="@{/my-products}">Ürünlerim</a>
                <a th:href="@{/shop-orders}">Siparişler</a>
                <a th:href="@{/dashboard}">📊 Dashboard</a>
                <a th:href="@{/profile}"> Profil</a>
                <a th:href="@{/logout}">Çıkış</a>
            </span>
            
            <!-- ADMIN menüsü -->
            <span sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin}">👑 Admin</a>
                <a th:href="@{/logout}">Çıkış</a>
            </span>
        </nav>
    </div>
</header>

<main class="container">
    <div class="auth-container">
        <div class="auth-card">
            <h2>Giriş Yap</h2>
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Kullanıcı Adı</label>
                    <input id="username" name="username" type="text" required />
                </div>
                <div class="form-group">
                    <label for="password">Şifre</label>
                    <input id="password" name="password" type="password" required />
                </div>
                <button class="auth-button" type="submit">Giriş Yap</button>
            </form>
            <p class="auth-link">Hesabın yok mu? <a th:href="@{/register}">Kayıt ol</a></p>
        </div>
    </div>
</main>

<footer>
    <div class="container">
        <p>&copy; 2025 Yerel Esnaf Sipariş Sistemi</p>
    </div>
</footer>
</body>
</html>
