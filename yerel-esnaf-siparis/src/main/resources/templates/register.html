<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol - Yerel Esnaf Sipariş Sistemi</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<header>
    <div class="container">
        <h1>Esnaf</h1>
        <nav>
            <a th:href="@{/}">Ana Sayfa</a>
            
            <!-- Giriş yapmamış kullanıcılar için -->
            <span sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}">Giriş</a>
                <a th:href="@{/register}">Kayıt Ol</a>
            </span>
            
            <!-- MÜŞTERİ menüsü -->
            <span sec:authorize="hasRole('CUSTOMER')">
                <a th:href="@{/cart}">Sepet</a>
                <a th:href="@{/orders}">Siparişlerim</a>
                <a th:href="@{/profile}"> Profil</a>
                <a th:href="@{/logout}">Çıkış</a>
            </span>
            
            <!-- ESNAF menüsü -->
            <span sec:authorize="hasRole('SHOP_OWNER')">
                <a th:href="@{/my-products}">Ürünlerim</a>
                <a th:href="@{/shop-orders}">Siparişler</a>
                <a th:href="@{/dashboard}">📊 Dashboard</a>
                <a th:href="@{/profile}"> Profil</a>
                <a th:href="@{/logout}">Çıkış</a>
            </span>
            
            <!-- ADMIN menüsü -->
            <span sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin}">👑 Admin</a>
                <a th:href="@{/logout}">Çıkış</a>
            </span>
        </nav>
    </div>
</header>

<main class="container">
    <div class="auth-container">
        <div class="auth-card">
            <h2>Kayıt Ol</h2>
            <form th:action="@{/register}" method="post" th:object="${user}">
                <div class="form-group">
                    <label for="username">Kullanıcı Adı</label>
                    <input id="username" th:field="*{username}" type="text" required />
                </div>
                <div class="form-group">
                    <label for="email">E-posta</label>
                    <input id="email" th:field="*{email}" type="email" required />
                </div>
                <div class="form-group">
                    <label for="password">Şifre</label>
                    <input id="password" th:field="*{password}" type="password" required />
                </div>
                <div class="form-group">
                    <label for="role">Rol</label>
                    <select id="role" th:field="*{role}" required>
                        <option th:value="${T(com.esnaf.yerel_esnaf_siparis.model.User.Role).CUSTOMER}">Müşteri</option>
                        <option th:value="${T(com.esnaf.yerel_esnaf_siparis.model.User.Role).SHOP_OWNER}">Esnaf</option>
                    </select>
                </div>
                <button class="auth-button" type="submit">Kayıt Ol</button>
            </form>
            <p class="auth-link">Zaten hesabın var mı? <a th:href="@{/login}">Giriş yap</a></p>
        </div>
    </div>
</main>

<footer>
    <div class="container">
        <p>&copy; 2025 Yerel Esnaf Sipariş Sistemi</p>
    </div>
</footer>
</body>
</html>
