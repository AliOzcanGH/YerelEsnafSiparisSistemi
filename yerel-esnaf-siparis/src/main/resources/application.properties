spring.application.name=yerel-esnaf-siparis

# Server Port (Eğer 8080 kullanılıyorsa 8081 yapabilirsiniz)
server.port=8080

# SQLite Veritabanı Ayarları
# Veritabanı dosyası otomatik olarak proje klasöründe oluşturulacaktır
spring.datasource.url=jdbc:sqlite:yerel_esnaf_db.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA/Hibernate Ayarları
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# SQLite Transaction Ayarları - SQLite için özel yapılandırma
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.connection.handling_mode=DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION
spring.jpa.properties.hibernate.jdbc.batch_size=0
spring.jpa.open-in-view=false
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Spring Security (İsteğe bağlı)
spring.security.user.name=admin
spring.security.user.password=123456