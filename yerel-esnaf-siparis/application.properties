# Bu dosya bir ÖRNEKTİR. Kendi application.properties dosyanızı oluşturun!

spring.application.name=yerel-esnaf-siparis

# Server Port (8080 portu başka bir uygulama tarafından kullanılıyorsa değiştirin)
server.port=8080

# SQLite Veritabanı Ayarları
# Veritabanı dosyası otomatik olarak proje klasöründe oluşturulacaktır (yerel_esnaf_db.db)
spring.datasource.url=jdbc:sqlite:yerel_esnaf_db.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA/Hibernate Ayarları
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# SQLite özel ayarları
spring.jpa.properties.hibernate.connection.handling_mode=DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION

# Spring Security (İsteğe bağlı - admin paneli için)
spring.security.user.name=admin
spring.security.user.password=admin123

# Notlar:
# - İlk çalıştırmada veritabanı dosyası ve tablolar otomatik oluşturulur (ddl-auto=update)
# - SQL sorguları konsola yazdırılır (show-sql=true) - üretimde false yapabilirsiniz
# - Port numarasını değiştirmek isterseniz server.port değerini değiştirin
# - Veritabanı dosyası (yerel_esnaf_db.db) proje klasöründe oluşturulur

